[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback - toda rota cai no index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Headers para permitir o app rodar dentro do iframe do GHL
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *;"
